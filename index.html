<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Atomic Habits Mini App</title>
  <style>
    :root {
      --bg: #f6efe4;
      --bg2: #e8ddcd;
      --card: #fff9f1;
      --text: #1a1f23;
      --muted: #5f646c;
      --accent: #ca5a2f;
      --accent-2: #2b7a68;
      --line: #d5c8b7;
      --danger: #b62929;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font: 15px/1.45 "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at 10% 0%, #fff4e8 0%, transparent 35%),
        radial-gradient(circle at 100% 0%, #e0f0ea 0%, transparent 28%),
        linear-gradient(145deg, var(--bg), var(--bg2));
    }

    .app {
      max-width: 920px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px 14px 92px;
    }

    h1, h2, h3 { margin: 0 0 10px; line-height: 1.2; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 2px 10px rgba(30, 30, 30, 0.04);
    }

    .grid { display: grid; gap: 10px; }

    .grid-2 { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .muted { color: var(--muted); }

    .small { font-size: 12px; }

    input, select, textarea, button {
      font: inherit;
      color: inherit;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fffdf9;
      border-radius: 10px;
      padding: 10px;
    }

    textarea { min-height: 90px; resize: vertical; }

    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 8px 12px;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    button.success {
      background: var(--accent-2);
      color: #fff;
      border-color: transparent;
    }

    .danger { color: var(--danger); }

    .chat {
      display: grid;
      gap: 8px;
      max-height: 48vh;
      overflow-y: auto;
      padding-right: 2px;
    }

    .bubble {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      max-width: 88%;
      white-space: pre-wrap;
    }

    .bubble.user {
      margin-left: auto;
      background: #ffe7d8;
      border-color: #e8c0a9;
    }

    .bubble.assistant {
      background: #e4f2ed;
      border-color: #bfd9cf;
    }

    .tabbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      margin: 0 auto;
      max-width: 920px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: rgba(255, 248, 238, 0.96);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--line);
      z-index: 30;
    }

    .tab {
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      padding: 12px 6px;
      font-size: 13px;
    }

    .tab:last-child { border-right: 0; }

    .tab.active {
      color: var(--accent);
      font-weight: 700;
      background: #ffead8;
    }

    .modal-wrap {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.44);
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .modal {
      width: min(700px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    @media (max-width: 740px) {
      .grid-2 { grid-template-columns: 1fr; }
      .tab { padding: 10px 4px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const STORAGE_KEY = "atomic_mini_app_single_html_v1";

    const TABS = [
      { id: "home", label: "Главная" },
      { id: "chat", label: "Чат" },
      { id: "plan", label: "План" },
      { id: "challenges", label: "Челленджи" },
      { id: "profile", label: "Профиль" }
    ];

    const CATEGORIES = [
      ["sleep", "Сон"], ["fitness", "Спорт"], ["nutrition", "Питание"],
      ["focus", "Фокус"], ["digital", "Диджитал-детокс"], ["mind", "Осознанность"],
      ["reading", "Чтение"], ["finance", "Финансы"], ["other", "Другое"]
    ];

    const TIPS = [
      "Сделай привычку очевидной: задай точный триггер (время + место).",
      "Начни с версии на 2 минуты, чтобы не сопротивляться старту.",
      "Не пропускай два дня подряд: сорвался вчера — сегодня делай минимум.",
      "Привяжи новую привычку к уже существующей рутине.",
      "Усложни доступ к плохой привычке и упрости доступ к хорошей."
    ];

    function uid() {
      return Date.now() + Math.floor(Math.random() * 10000);
    }

    function nowISO() {
      return new Date().toISOString();
    }

    function fmtDate(d) {
      const dt = new Date(d);
      return dt.toISOString().slice(0, 10);
    }

    function addDays(base, days) {
      const d = new Date(base);
      d.setDate(d.getDate() + days);
      return d;
    }

    function defaultState() {
      return {
        activeTab: "home",
        onboarding: {
          done: false,
          fullName: "",
          goalType: "both",
          category: "sleep",
          customCategory: "",
          description: "",
          accepted: false
        },
        mentorTone: "friendly",
        messages: [],
        plan: null,
        challenges: [],
        reminder: { enabled: true, time: "09:00", text: "Время сделать шаг по привычке." }
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        return Object.assign(defaultState(), JSON.parse(raw));
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function setState(patchFn) {
      patchFn(state);
      saveState();
      render();
    }

    function stats() {
      const tasks = state.plan?.tasks || [];
      const completed = tasks.filter(t => t.status === "completed");
      const points = completed.reduce((s, t) => s + (t.points || 0), 0);
      return {
        completedCount: completed.length,
        points,
        streak: Math.min(120, completed.length)
      };
    }

    function buildPlan() {
      const today = new Date();
      const tasks = [];
      for (let week = 0; week < 16; week++) {
        const date = addDays(today, week * 7);
        tasks.push({
          id: uid(),
          title: `Неделя ${week + 1}: ключевой шаг`,
          description: "Сделай маленькое, но повторяемое действие и зафиксируй результат.",
          dueDate: fmtDate(date),
          status: "not_started",
          points: 20
        });
      }
      return {
        id: uid(),
        startDate: fmtDate(today),
        endDate: fmtDate(addDays(today, 119)),
        tasks
      };
    }

    function mentorAnswer(userText) {
      const t = userText.toLowerCase();
      let advice = "Сделай сегодня минимальную версию привычки и закрепи ее в одно и то же время.";

      if (t.includes("сорв") || t.includes("не могу") || t.includes("прокраст")) {
        advice = "Разбей задачу на 2 минуты. Нужен не идеал, а повторяемость.";
      } else if (t.includes("кур") || t.includes("слад") || t.includes("плох")) {
        advice = "Увеличь трение: убери триггеры из окружения и задай четкое правило замены.";
      } else if (t.includes("мотивац")) {
        advice = "Не жди мотивации. Определи фиксированный триггер и запускай действие автоматически.";
      }

      const prefix = state.mentorTone === "strict"
        ? "Строго: "
        : state.mentorTone === "balanced"
          ? "По делу: "
          : "Поддержка: ";

      return prefix + advice + "\n\nМикрошаг на сегодня: 2 минуты сразу после текущей рутины.";
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function tabBar() {
      return `
        <nav class="tabbar">
          ${TABS.map(t => `<button class="tab ${state.activeTab === t.id ? "active" : ""}" data-tab="${t.id}">${t.label}</button>`).join("")}
        </nav>
      `;
    }

    function homePage() {
      const s = stats();
      const nextTask = state.plan?.tasks?.find(t => t.status === "not_started");
      const tip = TIPS[new Date().getDate() % TIPS.length];
      return `
        <section class="grid">
          <h1>Главная</h1>
          <div class="grid-2">
            <article class="card">
              <h3>Прогресс</h3>
              <div>Серия: <b>${s.streak}</b> дней</div>
              <div>Выполнено задач: <b>${s.completedCount}</b></div>
              <div>Очки: <b>${s.points}</b></div>
            </article>
            <article class="card">
              <h3>Следующий шаг</h3>
              ${nextTask
                ? `<div><b>${escapeHtml(nextTask.title)}</b></div><div class="small muted">Срок: ${nextTask.dueDate}</div>`
                : `<div class="muted">Сгенерируй план на вкладке "План".</div>`}
            </article>
          </div>
          <article class="card">
            <h3>Принцип Atomic Habits на сегодня</h3>
            <div>${escapeHtml(tip)}</div>
          </article>
        </section>
      `;
    }

    function chatPage() {
      return `
        <section class="grid">
          <h1>Чат с наставником</h1>
          <div class="card">
            <div class="chat">
              ${state.messages.length === 0
                ? `<div class="muted">Напиши вопрос, и наставник подскажет следующий шаг.</div>`
                : state.messages.map(m => `<div class="bubble ${m.role === "user" ? "user" : "assistant"}">${escapeHtml(m.text)}</div>`).join("")}
            </div>
          </div>
          <form class="card grid" id="chat-form">
            <textarea id="chat-input" maxlength="1200" placeholder="Напиши сообщение..."></textarea>
            <button class="primary" type="submit">Отправить</button>
          </form>
        </section>
      `;
    }

    function planPage() {
      const tasks = state.plan?.tasks || [];
      return `
        <section class="grid">
          <h1>План</h1>
          <div class="row">
            <button class="primary" id="gen-plan">Сгенерировать план на 3-4 месяца</button>
            ${state.plan ? `<span class="small muted">${state.plan.startDate} - ${state.plan.endDate}</span>` : ""}
          </div>
          <div class="list">
            ${tasks.length === 0
              ? `<article class="card muted">Плана пока нет.</article>`
              : tasks.map(t => `
                <article class="card">
                  <h3>${escapeHtml(t.title)}</h3>
                  <div>${escapeHtml(t.description || "")}</div>
                  <div class="small muted">Срок: ${t.dueDate} | Статус: ${t.status}</div>
                  <div class="row" style="margin-top:8px">
                    <button data-task="${t.id}" data-status="completed" class="success">Выполнено</button>
                    <button data-task="${t.id}" data-status="missed">Пропущено</button>
                    <button data-task="${t.id}" data-status="not_started">Сброс</button>
                  </div>
                </article>
              `).join("")}
          </div>
        </section>
      `;
    }

    function challengesPage() {
      return `
        <section class="grid">
          <h1>Челленджи</h1>
          <form id="challenge-form" class="card grid">
            <input id="challenge-title" maxlength="180" minlength="3" placeholder="Название челленджа" required />
            <input id="challenge-days" type="number" min="3" max="120" value="21" required />
            <button class="primary" type="submit">Создать</button>
          </form>
          <div class="list">
            ${state.challenges.length === 0
              ? `<article class="card muted">Челленджей пока нет.</article>`
              : state.challenges.map(c => `
                <article class="card">
                  <h3>${escapeHtml(c.title)}</h3>
                  <div class="small muted">${c.startDate} - ${c.endDate} | Очки: ${c.points}</div>
                  <div class="row" style="margin-top:8px">
                    <button data-challenge="${c.id}" data-checkin="completed" class="success">Сделал сегодня</button>
                    <button data-challenge="${c.id}" data-checkin="missed">Пропуск</button>
                    <button data-challenge="${c.id}" data-checkin="save">Сейв (1/мес)</button>
                  </div>
                </article>
              `).join("")}
          </div>
        </section>
      `;
    }

    function profilePage() {
      const s = stats();
      const fullName = state.onboarding.fullName || "Не указано";
      return `
        <section class="grid">
          <h1>Профиль</h1>
          <article class="card grid">
            <div>Имя: <b>${escapeHtml(fullName)}</b></div>
            <div>Цель: <b>${state.onboarding.goalType}</b></div>
            <div>Серия: <b>${s.streak}</b> | Очки: <b>${s.points}</b></div>
          </article>

          <article class="card grid">
            <h3>Тон наставника</h3>
            <select id="tone-select">
              <option value="friendly" ${state.mentorTone === "friendly" ? "selected" : ""}>Мягкий</option>
              <option value="balanced" ${state.mentorTone === "balanced" ? "selected" : ""}>Нейтральный</option>
              <option value="strict" ${state.mentorTone === "strict" ? "selected" : ""}>Строгий</option>
            </select>
          </article>

          <article class="card grid">
            <h3>Напоминания</h3>
            <input id="rem-time" type="time" value="${state.reminder.time}" />
            <input id="rem-text" maxlength="240" value="${escapeHtml(state.reminder.text)}" />
            <label class="row small"><input id="rem-enabled" type="checkbox" ${state.reminder.enabled ? "checked" : ""} /> Включено</label>
            <button id="save-reminder" class="primary">Сохранить</button>
          </article>
        </section>
      `;
    }

    function onboardingModal() {
      if (state.onboarding.done) return "";

      const cOptions = CATEGORIES.map(([v, l]) => `<option value="${v}" ${state.onboarding.category === v ? "selected" : ""}>${l}</option>`).join("");
      const charsLeft = 300 - (state.onboarding.description?.length || 0);

      return `
        <div class="modal-wrap">
          <form id="onboard-form" class="modal grid">
            <h2>Первый вход</h2>
            <div class="muted">Ответь на вопросы, чтобы собрать персональный план.</div>

            <label class="grid small">Как тебя зовут?
              <input id="ob-name" value="${escapeHtml(state.onboarding.fullName)}" minlength="2" maxlength="80" required />
            </label>

            <label class="grid small">Что хочешь сделать?
              <select id="ob-goal">
                <option value="build" ${state.onboarding.goalType === "build" ? "selected" : ""}>Привить хорошую привычку</option>
                <option value="quit" ${state.onboarding.goalType === "quit" ? "selected" : ""}>Убрать плохую привычку</option>
                <option value="both" ${state.onboarding.goalType === "both" ? "selected" : ""}>И то и другое</option>
              </select>
            </label>

            <label class="grid small">Категория
              <select id="ob-category">${cOptions}</select>
            </label>

            <label id="ob-custom-wrap" class="grid small" style="display:${state.onboarding.category === "other" ? "grid" : "none"}">Другое
              <input id="ob-custom" value="${escapeHtml(state.onboarding.customCategory || "")}" maxlength="80" />
            </label>

            <label class="grid small">Опиши привычку подробнее
              <textarea id="ob-desc" maxlength="300" required>${escapeHtml(state.onboarding.description || "")}</textarea>
              <span class="muted">Осталось символов: ${charsLeft}</span>
            </label>

            <label class="row small">
              <input id="ob-accept" type="checkbox" ${state.onboarding.accepted ? "checked" : ""} />
              Согласен с политикой конфиденциальности
            </label>

            <button class="primary" type="submit">Продолжить</button>
          </form>
        </div>
      `;
    }

    function pageContent() {
      if (state.activeTab === "chat") return chatPage();
      if (state.activeTab === "plan") return planPage();
      if (state.activeTab === "challenges") return challengesPage();
      if (state.activeTab === "profile") return profilePage();
      return homePage();
    }

    function render() {
      app.innerHTML = pageContent() + tabBar() + onboardingModal();
      bindEvents();
    }

    function bindEvents() {
      document.querySelectorAll(".tab").forEach(btn => {
        btn.onclick = () => setState(s => { s.activeTab = btn.dataset.tab; });
      });

      const chatForm = document.getElementById("chat-form");
      if (chatForm) {
        chatForm.onsubmit = (e) => {
          e.preventDefault();
          const input = document.getElementById("chat-input");
          const text = input.value.trim();
          if (!text) return;
          setState(s => {
            s.messages.push({ id: uid(), role: "user", text, at: nowISO() });
            s.messages.push({ id: uid(), role: "assistant", text: mentorAnswer(text), at: nowISO() });
          });
        };
      }

      const genPlan = document.getElementById("gen-plan");
      if (genPlan) {
        genPlan.onclick = () => setState(s => { s.plan = buildPlan(); });
      }

      document.querySelectorAll("button[data-task]").forEach(btn => {
        btn.onclick = () => {
          const id = Number(btn.dataset.task);
          const status = btn.dataset.status;
          setState(s => {
            const t = s.plan?.tasks?.find(x => x.id === id);
            if (t) t.status = status;
          });
        };
      });

      const challengeForm = document.getElementById("challenge-form");
      if (challengeForm) {
        challengeForm.onsubmit = (e) => {
          e.preventDefault();
          const title = document.getElementById("challenge-title").value.trim();
          const days = Number(document.getElementById("challenge-days").value || 21);
          if (title.length < 3) return;
          const start = new Date();
          const end = addDays(start, days - 1);
          setState(s => {
            s.challenges.unshift({
              id: uid(),
              title,
              days,
              points: 0,
              startDate: fmtDate(start),
              endDate: fmtDate(end),
              monthlySaves: {}
            });
          });
          challengeForm.reset();
        };
      }

      document.querySelectorAll("button[data-challenge]").forEach(btn => {
        btn.onclick = () => {
          const id = Number(btn.dataset.challenge);
          const type = btn.dataset.checkin;
          setState(s => {
            const c = s.challenges.find(x => x.id === id);
            if (!c) return;
            if (type === "completed") c.points += 10;
            if (type === "save") {
              const monthKey = new Date().toISOString().slice(0, 7);
              const used = c.monthlySaves[monthKey] || 0;
              if (used >= 1) {
                alert("Сейв уже использован в этом месяце.");
                return;
              }
              c.monthlySaves[monthKey] = used + 1;
            }
          });
        };
      });

      const toneSelect = document.getElementById("tone-select");
      if (toneSelect) {
        toneSelect.onchange = () => setState(s => { s.mentorTone = toneSelect.value; });
      }

      const saveReminderBtn = document.getElementById("save-reminder");
      if (saveReminderBtn) {
        saveReminderBtn.onclick = () => {
          const time = document.getElementById("rem-time").value;
          const text = document.getElementById("rem-text").value;
          const enabled = document.getElementById("rem-enabled").checked;
          setState(s => { s.reminder = { time, text, enabled }; });
          alert("Напоминание сохранено локально в браузере.");
        };
      }

      const obForm = document.getElementById("onboard-form");
      if (obForm) {
        const cat = document.getElementById("ob-category");
        const wrap = document.getElementById("ob-custom-wrap");
        const desc = document.getElementById("ob-desc");

        cat.onchange = () => {
          wrap.style.display = cat.value === "other" ? "grid" : "none";
        };

        desc.oninput = () => {
          const span = desc.parentElement.querySelector("span");
          span.textContent = `Осталось символов: ${300 - desc.value.length}`;
        };

        obForm.onsubmit = (e) => {
          e.preventDefault();
          const fullName = document.getElementById("ob-name").value.trim();
          const goalType = document.getElementById("ob-goal").value;
          const category = document.getElementById("ob-category").value;
          const customCategory = document.getElementById("ob-custom")?.value.trim() || "";
          const description = document.getElementById("ob-desc").value.trim();
          const accepted = document.getElementById("ob-accept").checked;

          if (!accepted) {
            alert("Нужно согласие с политикой.");
            return;
          }
          if (description.length < 3) {
            alert("Опиши привычку подробнее.");
            return;
          }

          setState(s => {
            s.onboarding = {
              done: true,
              fullName,
              goalType,
              category,
              customCategory,
              description,
              accepted
            };
            if (!s.plan) s.plan = buildPlan();
          });
        };
      }
    }

    const app = document.getElementById("app");
    const state = loadState();

    try {
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }
    } catch (e) {
      // ignore telegram init errors
    }

    render();
  </script>
</body>
</html>
